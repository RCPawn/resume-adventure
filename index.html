<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Kalam:wght@400;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600&display=swap" rel="stylesheet">
    <!-- 与 VueUse useColorMode(storageKey: theme) 一致，避免首屏主题闪烁 -->
    <meta name="color-scheme" content="light dark">
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme');
          var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var useDark = false;
          if (t === 'dark') useDark = true;
          else if (t === 'light') useDark = false;
          else useDark = prefersDark;
          if (useDark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <title>rcpawn's dev journey</title>
</head>
<body>
<div id="app"></div>
<script type="module" src="./src/main.js"></script>
</body>
</html>
